<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echoly</title>
  <link rel="stylesheet" href="style.css">
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light">
  <!-- Titlebar -->
  <header class="titlebar draggable">
    <div class="window-controls">
      <div class="control close"></div>
      <div class="control minimize"></div>
      <div class="control maximize"></div>
    </div>
    <div class="app-title">ECHOLY</div>
    <div class="file-name" id="file-name">demo-speech.txt</div>
    <button class="theme-toggle no-drag" id="theme-toggle">
      <i data-lucide="moon"></i>
    </button>
  </header>

  <!-- Toolbar -->
  <div class="toolbar no-drag">
    <button class="tool-btn" id="open-file" title="Open File">
      <i data-lucide="folder"></i>
      <input type="file" id="file-input" accept=".txt" style="display: none;">
    </button>
    <div class="divider"></div>
    <button class="tool-btn" id="play-pause" title="Play / Pause">
      <i data-lucide="play" id="play-icon"></i>
    </button>
    <div class="divider"></div>
    <div class="font-controls">
      <button class="tool-btn text-btn" id="font-decrease">A-</button>
      <div class="font-size-display" id="font-size-display">26pt</div>
      <button class="tool-btn text-btn" id="font-increase">A+</button>
    </div>
    <div class="divider"></div>
    <button class="tool-btn" id="settings-btn" title="Settings">
      <i data-lucide="settings"></i>
    </button>
  </div>

  <!-- Main Prompter Area -->
  <main class="prompter-container" id="prompter-container">
    <div class="prompter-content" id="prompter-content">
      <!-- Text lines injected here by JS -->
    </div>
    <div class="reading-line-indicator left"></div>
    <div class="reading-line-indicator right"></div>
  </main>

  <!-- Footer -->
  <footer class="status-bar">
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">PAUSED</span>
    </div>
    <div class="pagination" id="pagination">1 / 17</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
